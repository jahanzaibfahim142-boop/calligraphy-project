<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup</title>
<link rel="stylesheet" href="login.css">
<link rel="icon" type="image/png" sizes="16x16" href="assest/images/LOGO_3-removebg-preview.png">
</head>

<body>

<div class="form-box">
  <span class="close-btn" onclick="goBack()">✖</span>

  <h2>Signup</h2>
  <input type="text" id="name" placeholder="Name">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <!-- Added onclick -->
  <button class="btn" onclick="signup()">Signup</button>

  <p>Already have account? <a href="login.html">Login</a></p>
</div>

<script>
function goBack() {
  window.location.href = "index.html";
}

function signup() {
  let name = document.getElementById("name").value;

  if (name === "") {
    alert("Please enter your name!");
  } else {
    alert("Signup successful, " + name + "!");
  }
}
</script>

</body>
</html>
