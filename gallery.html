/* 🌟 Advanced Contact Form */
.contact {
    max-width: 800px;
    margin: auto;
    padding: 40px 20px;
    border-radius: 50px;
    background: rgba(71, 37, 2, 0.76);
    backdrop-filter: blur(12px);
    box-shadow:
        0 0 25px rgba(244,196,48,0.2),
        0 0 80px rgba(0, 0, 0, 0.671);
        border-bottom: #2e1a0f;
}

body{
  padding-top: 80px; /* fixed navbar ke liye space */
}

/* Navbar style */
.bgcolor{
  background-color:#572E13;
}

/* Logo image */
.navbar-brand img{
  height:50px;
  object-fit:contain;
}

/* Brand text */
.navbar-brand span{
  color:#f8e090;
  font-weight:bold;
  font-size:20px;
}

/* Links */
.nav-link{
  color:white !important;
  margin: 0 10px;
  transition:0.3s;
}

.nav-link:hover{
  color:#f8e090 !important;
  transform:translateY(-2px);
}

.input-group {
    position: relative;
    margin: 25px 0;
}

/* Icons */
.input-group .icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #ecc755;
    font-size: 18px;
    pointer-events: none;
}

/* Inputs & textarea */
.input-group input,
.input-group textarea {
    width: 100%;
    padding: 12px 12px 12px 40px;
    border-radius: 10px;
    border: 1px solid rgba(244,196,48,0.3);
    background: transparent;
    color: #fff;
    outline: none;
    font-size: 14px;
    transition: 0.3s;
}

/* Floating label */
.input-group label {
    position: absolute;
    left: 40px;
    top: 12px;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    pointer-events: none;
    transition: 0.3s;
}

/* Focus & valid */
.input-group input:focus + label,
.input-group input:valid + label,
.input-group textarea:focus + label,
.input-group textarea:valid + label {
    top: -10px;
    left: 35px;
    font-size: 12px;
    color: #f4c430;
    background: var(--dark-brown);
    padding: 0 5px;
}

/* Glow effect */
.input-group input:focus,
.input-group textarea:focus {
    border-color: #f4c430;
    box-shadow: 0 0 10px #f4c430;
}

/* Animated bottom line */
.input-group::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: #f4c430;
    transition: 0.4s;
}

.input-group:focus-within::after {
    width: 100%;
}

/* Textarea fix */
.input-group.textarea .icon {
    top: 20px;
}

.input-group.textarea label {
    top: 12px;
}

/* Button */
.contact button {
    margin-top: 20px;
    background: linear-gradient(135deg, #ecc755, #f4c430);
    border: none;
    padding: 12px 30px;
    border-radius: 10px;
    color: #3b220f;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: 0.3s;
}

/* Shine animation */
.contact button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
    transition: 0.5s;
}

.contact button:hover::before {
    left: 100%;
}

.contact button:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 20px #f4c430;
}

/* Responsive */
@media (max-width: 576px) {
    .contact {
        padding: 35px 15px;
    }
}

/* Hero */

    text-align: center;
}

.indic-heading {

}

.urdu-text {
    font-family: 'Noto Nastaliq Urdu', serif;
}

/* Section */
section {
    padding: 80px 20px;
    text-align: center;
}

.divider {
    width: 80px;
    height: 3px;
    background: var(--honey);
    margin: 10px auto 30px;
}

/* ✅ FIXED GALLERY (single clean version) */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 25px;
    justify-items: center;
}

/* Card */
.card {
    width: 240px;
    height: 320px;
    background: transparent;
    border: none;
    perspective: 1000px;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow:
        0 0 15px #f4c430,
        0 0 40px rgba(244,196,48,0.7),
        0 0 80px rgba(244,196,48,0.4);
}

.card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s ease;
}

.card:hover .card-inner {
    transform: rotateY(180deg);
}

.card-front,
.card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 15px;
    overflow: hidden;
    backface-visibility: hidden;
}

.card-front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.6s;
}

.card:hover img {
    transform: scale(1.1);
    filter: brightness(1.1) drop-shadow(0 0 12px #f4c430);
}

.card-back {
    background: linear-gradient(135deg, #ecc755, #f4c430);
    color: #3b220f;
    transform: rotateY(180deg);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Contact */
.contact input,
.contact textarea {
    width: 100%;
    max-width: 500px;
    margin: 10px auto;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

/* Footer */
